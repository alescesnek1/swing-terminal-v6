# ─────────────────────────────────────────────────────────────
# Swing Terminal v1.0 — Fly.io Configuration
# Region: nrt (Tokyo) for minimal latency to Binance
# ─────────────────────────────────────────────────────────────

app = "swing-terminal-ingest"
primary_region = "nrt"

[build]

[env]
  NODE_ENV = "production"
  PORT = "8080"

[http_service]
  internal_port = 8080
  force_https = true
  auto_stop_machines = "off"
  auto_start_machines = true
  min_machines_running = 1

  [[http_service.checks]]
    interval = "15s"
    grace_period = "10s"
    method = "GET"
    path = "/healthz"
    timeout = "5s"

  [[http_service.checks]]
    interval = "30s"
    grace_period = "30s"
    method = "GET"
    path = "/readyz"
    timeout = "5s"

[[vm]]
  size = "shared-cpu-1x"
  memory = "256mb"
